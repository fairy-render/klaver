[package]
name = "klaver"
version = "0.2.0"
edition = "2024"

[features]
swc = ["klaver-modules/swc-transform"]

full = ["fetch", "crypto", "intl"]

fetch = ["klaver-wintertc2/fetch"]
crypto = ["klaver-wintertc2/crypto"]
intl = ["klaver-wintertc2/intl"]
intl-baked = ["klaver-wintertc2/intl-baked"]

[dependencies]
klaver-wintertc2 = { path = "../klaver-wintertc2", features = [
    "module",
    "tokio",
] }
klaver-vm = { path = "../klaver-vm" }
klaver-modules = { path = "../klaver-modules" }
klaver-runtime = { path = "../klaver-runtime" }
klaver-base = { path = "../klaver-base" }
rquickjs = { workspace = true }
futures.workspace = true


[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros"] }
